name: Deploy to GitHub Pages

on:
  # master(또는 main)에 push될 때마다 빌드 & 배포
  push:
    branches: [master, main]
  # Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# GITHUB_TOKEN에 Pages 배포 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 실행 (진행 중인 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          node-version: 22 # Astro 5는 Node >=22.12.0 필요

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
